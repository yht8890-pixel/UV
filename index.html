<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UV 차단제 수행평가 감상 수집</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, query } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBjPnfjc2iLtQYTurUtpUn8nZ4WGg2tUfw",
      authDomain: "uvassessment.firebaseapp.com",
      projectId: "uvassessment",
      storageBucket: "uvassessment.firebasestorage.app",
      messagingSenderId: "367030438185",
      appId: "1:367030438185:web:b95085f625f7d424420f38"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let allSubmissions = [];

    signInAnonymously(auth);

    window.handleSubmit = async (e) => {
      e.preventDefault();
      const studentId = document.getElementById('studentId').value;
      const name = document.getElementById('name').value;
      const classGroup = document.getElementById('classGroup').value;
      const learned = document.getElementById('learned').value;
      const moreInfo = document.getElementById('moreInfo').value || "";
      const feeling = document.getElementById('feeling').value;

      if (!/^30\d{3}$/.test(studentId)) {
        alert("학번은 '30'으로 시작하는 5자리 숫자여야 합니다.");
        return;
      }
      if (!name.trim() || !learned.trim() || !feeling.trim()) {
        alert("모든 필수 항목을 입력해주세요.");
        return;
      }

      try {
        await addDoc(collection(db, 'submissions'), {
          studentId, name, classGroup, learned, moreInfo, feeling,
          timestamp: new Date().toLocaleString(),
        });
        alert('제출되었습니다!');
        document.getElementById('studentForm').reset();
      } catch (error) {
        alert("제출에 실패했습니다.");
      }
    };

    window.checkAdmin = () => {
      const pass = document.getElementById('adminPass').value;
      // 비밀번호 변경: SAbu2026#
      if (pass === 'SAbu2026#') {
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        loadData();
      } else {
        alert('비밀번호가 틀렸습니다.');
      }
    };

    async function loadData() {
      const snapshot = await getDocs(query(collection(db, 'submissions')));
      allSubmissions = snapshot.docs.map(doc => doc.data());
      
      const counts = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };
      allSubmissions.forEach(s => { if (counts[s.classGroup] !== undefined) counts[s.classGroup]++; });
      
      const summaryHTML = Object.entries(counts).map(([cls, count]) => 
        `<span class="mr-3 font-semibold">${cls}분반: ${count}명</span>`
      ).join('');
      
      document.getElementById('summary').innerHTML = summaryHTML;
      document.getElementById('dataList').innerHTML = allSubmissions.map(s => 
        `<div class="border-b py-2 text-xs">${s.timestamp} | ${s.studentId} ${s.name} (${s.classGroup}분반)</div>`
      ).join('');
    }

    window.downloadCSV = () => {
      const headers = ["제출시간", "학번", "이름", "분반", "알게된점", "더알고싶은점", "감상"];
      const rows = allSubmissions.map(s => [
        s.timestamp, s.studentId, s.name, s.classGroup, 
        `"${(s.learned || "").replace(/"/g, '""')}"`, 
        `"${(s.moreInfo || "").replace(/"/g, '""')}"`, 
        `"${(s.feeling || "").replace(/"/g, '""')}"`
      ]);
      const csvContent = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
      const blob = new Blob(["\ufeff" + csvContent], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "수행평가_결과.csv";
      link.click();
    };
  </script>
</head>
<body class="bg-gray-50 p-6">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6 text-center text-blue-800">UV 차단제 수행평가 감상</h1>
    
    <form id="studentForm" onsubmit="handleSubmit(event)" class="bg-white p-6 rounded shadow space-y-4">
      <input id="studentId" type="text" placeholder="학번 (30으로 시작)" class="w-full border p-2 rounded" required>
      <input id="name" type="text" placeholder="이름" class="w-full border p-2 rounded" required>
      <select id="classGroup" class="w-full border p-2 rounded">
        <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option>
      </select>
      <textarea id="learned" placeholder="새롭게 알게 된 점" class="w-full border p-2 rounded" required></textarea>
      <textarea id="moreInfo" placeholder="더 알고 싶은 점" class="w-full border p-2 rounded"></textarea>
      <textarea id="feeling" placeholder="감상" class="w-full border p-2 rounded" required></textarea>
      <button class="w-full bg-blue-600 text-white p-2 rounded">제출하기</button>
    </form>

    <div id="adminPanel" class="mt-8">
      <input id="adminPass" type="password" placeholder="관리자 비밀번호" class="w-full border p-2 rounded mb-2">
      <button onclick="checkAdmin()" class="w-full bg-red-600 text-white p-2 rounded">관리자 모드 접속</button>
    </div>

    <div id="dashboard" class="hidden bg-white p-6 rounded shadow mt-8">
      <div class="mb-4">
        <h2 class="font-bold mb-2">분반별 제출 현황</h2>
        <div id="summary" class="text-sm bg-gray-100 p-2 rounded"></div>
      </div>
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold">전체 제출 목록</h2>
        <button onclick="downloadCSV()" class="bg-green-600 text-white px-3 py-1 rounded text-sm">엑셀(CSV) 다운로드</button>
      </div>
      <div id="dataList" class="text-sm h-64 overflow-y-auto"></div>
      <button onclick="location.reload()" class="mt-4 text-blue-600">뒤로가기</button>
    </div>
  </div>
</body>
</html>
