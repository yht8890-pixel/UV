<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV 차단제 수행평가 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-blue-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">UV 차단제 수행평가 제출</h1>
            <button id="adminModeBtn" class="bg-blue-800 px-3 py-1 rounded text-sm hover:bg-blue-900">교사용 관리자 모드</button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 py-8">
        <div id="studentFormSection" class="bg-white p-6 rounded-xl shadow-md">
            <form id="submissionForm" class="space-y-4">
                <div class="grid grid-cols-3 gap-4">
                    <input type="text" id="sid" placeholder="학번(5자리)" required class="border p-2 rounded">
                    <input type="text" id="sname" placeholder="이름" required class="border p-2 rounded">
                    <select id="sclass" required class="border p-2 rounded">
                        <option value="">분반 선택</option>
                        <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                        <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                    </select>
                </div>
                <textarea id="s1" placeholder="인상 깊었던 부분" required class="w-full border p-2 rounded"></textarea>
                <textarea id="s2" placeholder="배운 점 및 감상" required class="w-full border p-2 rounded"></textarea>
                <textarea id="s3" placeholder="더 조사하고 싶은 점" required class="w-full border p-2 rounded"></textarea>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">제출하기</button>
            </form>
        </div>

        <div id="adminSection" class="hidden space-y-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">지원자 현황</h2>
                <button id="exitAdminBtn" class="bg-slate-600 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition">
                    <i class="fa-solid fa-arrow-left mr-2"></i>학생 모드로 전환
                </button>
            </div>

            <div id="statsSection" class="grid grid-cols-2 md:grid-cols-7 gap-2 bg-blue-50 p-4 rounded-xl border border-blue-200">
                <div class="bg-blue-600 text-white p-2 rounded text-center font-bold">전체: <span id="totalCount">0</span>명</div>
                <div class="bg-white p-2 rounded text-center border">A: <span id="countA">0</span></div>
                <div class="bg-white p-2 rounded text-center border">B: <span id="countB">0</span></div>
                <div class="bg-white p-2 rounded text-center border">C: <span id="countC">0</span></div>
                <div class="bg-white p-2 rounded text-center border">D: <span id="countD">0</span></div>
                <div class="bg-white p-2 rounded text-center border">E: <span id="countE">0</span></div>
                <div class="bg-white p-2 rounded text-center border">F: <span id="countF">0</span></div>
            </div>

            <div class="flex justify-end items-center space-x-2">
                <select id="filterClass" class="border p-1 rounded"><option value="ALL">전체분반</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option><option value="F">F</option></select>
                <button id="downloadExcel" class="bg-green-600 text-white px-3 py-1 rounded">엑셀 저장</button>
            </div>
            <div class="bg-white rounded-xl shadow-md overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-slate-100"><tr><th class="p-2">학번</th><th class="p-2">이름</th><th class="p-2">분반</th><th class="p-2">제출시간</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="pwModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
        <div class="bg-white p-6 rounded-lg w-80 text-center">
            <input type="password" id="pwInput" placeholder="비밀번호 입력" class="border p-2 w-full mb-4">
            <div class="flex gap-2">
                <button id="pwCheckBtn" class="bg-blue-600 text-white flex-1 py-2 rounded">확인</button>
                <button id="pwCancelBtn" class="bg-gray-400 text-white flex-1 py-2 rounded">취소</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjPnfjc2iLtQYTurUtpUn8nZ4WGg2tUfw",
            authDomain: "uvassessment.firebaseapp.com",
            projectId: "uvassessment",
            storageBucket: "uvassessment.firebasestorage.app",
            messagingSenderId: "367030438185",
            appId: "1:367030438185:web:b95085f625f7d424420f38"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        signInAnonymously(getAuth());

        // 폼 제출 이벤트 리스너를 명시적으로 처리
        document.getElementById('submissionForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            try {
                await addDoc(collection(db, "submissions"), {
                    sid: document.getElementById('sid').value,
                    sname: document.getElementById('sname').value,
                    sclass: document.getElementById('sclass').value,
                    s1: document.getElementById('s1').value, 
                    s2: document.getElementById('s2').value, 
                    s3: document.getElementById('s3').value,
                    time: serverTimestamp()
                });
                alert('제출 완료!'); 
                document.getElementById('submissionForm').reset();
            } catch (err) {
                console.error(err);
                alert('제출 실패. 다시 시도해주세요.');
            }
        });

        document.getElementById('adminModeBtn').onclick = () => {
            document.getElementById('pwInput').value = '';
            document.getElementById('pwModal').classList.remove('hidden');
        };
        
        document.getElementById('pwCancelBtn').onclick = () => {
            document.getElementById('pwModal').classList.add('hidden');
        };

        document.getElementById('exitAdminBtn').onclick = () => {
            document.getElementById('studentFormSection').classList.remove('hidden');
            document.getElementById('adminSection').classList.add('hidden');
        };

        document.getElementById('pwCheckBtn').onclick = async () => {
            if(document.getElementById('pwInput').value === 'sabu2026') {
                document.getElementById('pwModal').classList.add('hidden');
                document.getElementById('studentFormSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                loadData();
            } else {
                alert('비밀번호 불일치');
                document.getElementById('pwInput').value = '';
            }
        };

        let dataList = [];
        async function loadData() {
            const q = query(collection(db, "submissions"), orderBy("time", "desc"));
            const snap = await getDocs(q);
            dataList = snap.docs.map(d => d.data());
            updateStats();
            renderTable(dataList);
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = dataList.length;
            ['A','B','C','D','E','F'].forEach(cls => {
                const count = dataList.filter(d => d.sclass === cls).length;
                document.getElementById('count' + cls).textContent = count;
            });
        }

        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            const cls = document.getElementById('filterClass').value;
            tbody.innerHTML = list.filter(d => cls === 'ALL' || d.sclass === cls).map(d => `
                <tr class="border-b text-center">
                    <td class="p-2">${d.sid}</td><td class="p-2">${d.sname}</td>
                    <td class="p-2">${d.sclass}</td><td class="p-2">${d.time?.toDate().toLocaleString() || '방금 전'}</td>
                </tr>`).join('');
        }

        document.getElementById('filterClass').onchange = () => renderTable(dataList);
        document.getElementById('downloadExcel').onclick = () => {
            const ws = XLSX.utils.json_to_sheet(dataList);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Submissions");
            XLSX.writeFile(wb, "제출자명단.xlsx");
        };
    </script>
</body>
</html>
