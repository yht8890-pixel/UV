<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UV 차단제의 화학 - 수행평가 감상평 제출</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white/20 p-2 rounded-lg backdrop-blur-sm">
                    <i class="fa-solid fa-flask text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg md:text-xl tracking-tight">UV 차단제 화학 수행평가</h1>
                    <p class="text-xs text-blue-100 font-light">원리 탐구 및 배운 점 제출 시스템</p>
                </div>
            </div>
            <button id="adminBtn" class="flex items-center space-x-2 bg-white/10 hover:bg-white/20 border border-white/20 text-white px-4 py-2 rounded-lg text-sm transition-all duration-200">
                <i class="fa-solid fa-lock-open"></i>
                <span>교사용 관리자 모드</span>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 flex-grow w-full">
        <div id="toast" class="hidden fixed bottom-5 right-5 z-50"></div>
        <div id="studentView" class="space-y-8">
            <div class="bg-white rounded-3xl p-6 md:p-8 shadow-md border border-slate-100 max-w-3xl mx-auto">
                <form id="submissionForm" class="space-y-6">
                    <h2 class="text-2xl font-bold text-slate-900 text-center mb-6">감상평 및 탐구 성찰 제출</h2>
                    
                    <div class="grid md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">학번 (5자리)</label>
                            <input type="text" id="studentId" required maxlength="5" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">이름</label>
                            <input type="text" id="studentName" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">분반</label>
                            <select id="classSection" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="" disabled selected>분반 선택</option>
                                <option value="A">A 분반</option>
                                <option value="B">B 분반</option>
                                <option value="C">C 분반</option>
                                <option value="D">D 분반</option>
                                <option value="E">E 분반</option>
                                <option value="F">F 분반</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">인상 깊었던 부분</label>
                        <textarea id="impressivePart" required rows="3" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">배운 점 및 감상</label>
                        <textarea id="learnedReflection" required rows="3" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">더 조사하고 싶은 점</label>
                        <textarea id="furtherTopics" required rows="3" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full py-4 bg-indigo-700 hover:bg-indigo-800 text-white font-bold rounded-xl shadow-lg transition-all">제출하기</button>
                </form>
            </div>
        </div>
        
        <div id="adminView" class="hidden space-y-6">
            <h2 class="text-2xl font-bold text-slate-900">제출 현황 관리자 페이지</h2>
            <div id="submissionsTableBody" class="bg-white rounded-xl shadow border p-4"></div>
        </div>
    </main>

</body>
</html>
